<svg width="1200" height="750" viewBox="0 0 1200 750" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">CLIProxyAPI project visual</title>
  <desc id="desc">A terminal gateway routing CLI model traffic to multiple AI providers through secure API streams.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="750" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111f"/>
      <stop offset="0.55" stop-color="#101735"/>
      <stop offset="1" stop-color="#18102b"/>
    </linearGradient>
    <linearGradient id="cyan" x1="227" y1="375" x2="977" y2="375" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="panel" x1="300" y1="190" x2="900" y2="570" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f213a"/>
      <stop offset="1" stop-color="#17142d"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.219 0 0 0 0 0.741 0 0 0 0 0.973 0 0 0 0.65 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="1200" height="750" rx="56" fill="url(#bg)"/>
  <path d="M124 156C235 85 370 78 512 134C668 196 783 112 900 100C1019 88 1091 154 1130 221" stroke="#38bdf8" stroke-opacity=".12" stroke-width="2"/>
  <path d="M93 616C214 541 336 528 463 586C609 653 724 590 847 557C973 523 1080 561 1143 631" stroke="#a78bfa" stroke-opacity=".14" stroke-width="2"/>

  <g opacity=".7">
    <circle cx="161" cy="183" r="4" fill="#38bdf8"/>
    <circle cx="1025" cy="162" r="5" fill="#a78bfa"/>
    <circle cx="1055" cy="610" r="3" fill="#38bdf8"/>
    <circle cx="208" cy="590" r="3" fill="#a78bfa"/>
  </g>

  <g stroke="url(#cyan)" stroke-width="5" stroke-linecap="round" filter="url(#glow)">
    <path d="M284 375H176C146 375 122 351 122 321V292"/>
    <path d="M284 375H176C146 375 122 399 122 429V458"/>
    <path d="M916 375H1024C1054 375 1078 351 1078 321V292"/>
    <path d="M916 375H1024C1054 375 1078 399 1078 429V458"/>
    <path d="M284 375H916" stroke-opacity=".55"/>
  </g>

  <g transform="translate(300 188)">
    <rect width="600" height="374" rx="34" fill="url(#panel)" stroke="#ffffff" stroke-opacity=".12"/>
    <rect x="22" y="22" width="556" height="330" rx="22" fill="#060b15" stroke="#38bdf8" stroke-opacity=".22"/>
    <circle cx="52" cy="50" r="7" fill="#fb7185"/>
    <circle cx="76" cy="50" r="7" fill="#facc15"/>
    <circle cx="100" cy="50" r="7" fill="#34d399"/>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="28" font-weight="700">
      <text x="52" y="121" fill="#38bdf8">$</text>
      <text x="91" y="121" fill="#e5e7eb">proxy serve</text>
      <text x="52" y="177" fill="#8b5cf6">route</text>
      <text x="150" y="177" fill="#e5e7eb">/v1/chat</text>
      <text x="52" y="233" fill="#22d3ee">auth</text>
      <text x="130" y="233" fill="#e5e7eb">oauth + api-key</text>
      <text x="52" y="289" fill="#a78bfa">balance</text>
      <text x="174" y="289" fill="#e5e7eb">multi-account</text>
    </g>

    <rect x="386" y="90" width="138" height="170" rx="24" fill="#111827" stroke="#38bdf8" stroke-opacity=".35"/>
    <path d="M424 151C424 133 438 119 456 119C473 119 487 133 487 151V166H424V151Z" stroke="#38bdf8" stroke-width="8" stroke-linecap="round"/>
    <rect x="411" y="158" width="90" height="70" rx="14" fill="#38bdf8" fill-opacity=".18" stroke="#a78bfa" stroke-opacity=".7"/>
    <circle cx="456" cy="193" r="10" fill="#e5e7eb"/>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-weight="700" font-size="34" fill="#e5e7eb">
    <text x="85" y="258">CLI</text>
    <text x="84" y="514">SDK</text>
    <text x="970" y="258">OpenAI</text>
    <text x="966" y="514">Claude</text>
  </g>

  <g transform="translate(495 610)">
    <rect width="210" height="54" rx="27" fill="#ffffff" fill-opacity=".08" stroke="#ffffff" stroke-opacity=".14"/>
    <circle cx="35" cy="27" r="10" fill="#34d399"/>
    <circle cx="61" cy="27" r="10" fill="#38bdf8"/>
    <circle cx="87" cy="27" r="10" fill="#a78bfa"/>
    <path d="M123 27H179" stroke="#e5e7eb" stroke-opacity=".8" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
