<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Digital Twin operating loop</title>
  <desc id="desc">A file-first digital twin loop: retrieve context, route capability, execute work, write back assets, learn durable rules.</desc>
  <rect width="1200" height="760" rx="48" fill="#0B1220"/>
  <circle cx="980" cy="108" r="220" fill="#2563EB" opacity="0.2"/>
  <circle cx="155" cy="620" r="260" fill="#7C3AED" opacity="0.16"/>
  <path d="M208 381C208 164 992 164 992 381C992 598 208 598 208 381Z" stroke="#60A5FA" stroke-width="5" stroke-dasharray="18 16" opacity="0.55"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2 2L12 7L2 12Z" fill="#93C5FD"/>
    </marker>
  </defs>
  <text x="600" y="84" text-anchor="middle" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui" font-size="44" font-weight="800">Digital Twin Operating Loop</text>
  <text x="600" y="126" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="22">retrieve → route → execute → write back → learn</text>
  <g filter="url(#shadow)">
    <rect x="456" y="294" width="288" height="174" rx="28" fill="#111827" stroke="#60A5FA" stroke-width="3"/>
    <text x="600" y="354" text-anchor="middle" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui" font-size="30" font-weight="800">Steven&apos;s Twin</text>
    <text x="600" y="392" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui" font-size="18">file-first agent layer</text>
    <text x="600" y="426" text-anchor="middle" fill="#93C5FD" font-family="Inter, ui-sans-serif, system-ui" font-size="17" font-weight="700">not a chatbot · an operating system</text>
  </g>
  <g font-family="Inter, ui-sans-serif, system-ui" filter="url(#shadow)">
    <g>
      <rect x="92" y="302" width="224" height="112" rx="24" fill="#F8FAFC"/>
      <text x="204" y="346" text-anchor="middle" fill="#0F172A" font-size="24" font-weight="800">Retrieve</text>
      <text x="204" y="378" text-anchor="middle" fill="#475569" font-size="17">wiki · essays · outputs</text>
    </g>
    <g>
      <rect x="236" y="144" width="238" height="112" rx="24" fill="#EFF6FF"/>
      <text x="355" y="188" text-anchor="middle" fill="#1D4ED8" font-size="24" font-weight="800">Route</text>
      <text x="355" y="220" text-anchor="middle" fill="#475569" font-size="17">choose a capability</text>
    </g>
    <g>
      <rect x="726" y="144" width="238" height="112" rx="24" fill="#EEF2FF"/>
      <text x="845" y="188" text-anchor="middle" fill="#5B21B6" font-size="24" font-weight="800">Execute</text>
      <text x="845" y="220" text-anchor="middle" fill="#475569" font-size="17">write · code · research</text>
    </g>
    <g>
      <rect x="884" y="302" width="224" height="112" rx="24" fill="#F0FDFA"/>
      <text x="996" y="346" text-anchor="middle" fill="#0F766E" font-size="24" font-weight="800">Write Back</text>
      <text x="996" y="378" text-anchor="middle" fill="#475569" font-size="17">assets, not chats</text>
    </g>
    <g>
      <rect x="481" y="558" width="238" height="112" rx="24" fill="#FEF3C7"/>
      <text x="600" y="602" text-anchor="middle" fill="#92400E" font-size="24" font-weight="800">Learn</text>
      <text x="600" y="634" text-anchor="middle" fill="#475569" font-size="17">rules for next time</text>
    </g>
  </g>
  <g stroke="#93C5FD" stroke-width="4" marker-end="url(#arrow)" opacity="0.9">
    <path d="M316 342C360 278 397 246 458 221"/>
    <path d="M474 189C568 144 632 144 725 188"/>
    <path d="M964 223C1020 248 1049 275 1072 317"/>
    <path d="M990 414C940 516 825 596 720 612"/>
    <path d="M480 612C340 596 224 502 204 414"/>
  </g>
  <g font-family="Inter, ui-sans-serif, system-ui" font-size="18" fill="#CBD5E1">
    <text x="112" y="702">The durable loop makes every useful task leave something behind.</text>
  </g>
</svg>
