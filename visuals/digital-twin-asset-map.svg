<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Digital Twin asset map</title>
  <desc id="desc">A map showing raw notes, wiki, capabilities, published site, and learning notes connected around the digital twin.</desc>
  <rect width="1200" height="760" rx="48" fill="#F8FAFC"/>
  <path d="M0 0H1200V760H0V0Z" fill="url(#grid)" opacity="0.42"/>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#CBD5E1" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto">
      <path d="M2 2L11 6.5L2 11Z" fill="#64748B"/>
    </marker>
  </defs>
  <text x="600" y="82" text-anchor="middle" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui" font-size="44" font-weight="850">Assets, Not Impressions</text>
  <text x="600" y="124" text-anchor="middle" fill="#475569" font-family="Inter, ui-sans-serif, system-ui" font-size="22">The twin turns messy context into public and reusable files.</text>
  <g stroke="#64748B" stroke-width="3" marker-end="url(#arrow)" opacity="0.65">
    <path d="M328 240C410 218 470 230 532 302"/>
    <path d="M872 240C790 218 730 230 668 302"/>
    <path d="M330 520C415 540 486 520 538 459"/>
    <path d="M870 520C785 540 714 520 662 459"/>
    <path d="M600 496V606"/>
  </g>
  <g font-family="Inter, ui-sans-serif, system-ui" filter="url(#shadow)">
    <g>
      <rect x="470" y="292" width="260" height="184" rx="32" fill="#0F172A"/>
      <circle cx="600" cy="358" r="32" fill="#3B82F6"/>
      <path d="M584 358H616M600 342V374" stroke="white" stroke-width="6" stroke-linecap="round"/>
      <text x="600" y="420" text-anchor="middle" fill="#F8FAFC" font-size="30" font-weight="850">Digital Twin</text>
      <text x="600" y="452" text-anchor="middle" fill="#CBD5E1" font-size="17">capability router + memory loop</text>
    </g>
    <g>
      <rect x="110" y="180" width="248" height="128" rx="26" fill="#DBEAFE"/>
      <text x="234" y="230" text-anchor="middle" fill="#1E3A8A" font-size="25" font-weight="850">Raw Notes</text>
      <text x="234" y="262" text-anchor="middle" fill="#334155" font-size="17">thoughts · transcripts · links</text>
    </g>
    <g>
      <rect x="842" y="180" width="248" height="128" rx="26" fill="#EDE9FE"/>
      <text x="966" y="230" text-anchor="middle" fill="#5B21B6" font-size="25" font-weight="850">Wiki</text>
      <text x="966" y="262" text-anchor="middle" fill="#334155" font-size="17">judgment · style · context</text>
    </g>
    <g>
      <rect x="110" y="452" width="248" height="128" rx="26" fill="#DCFCE7"/>
      <text x="234" y="502" text-anchor="middle" fill="#166534" font-size="25" font-weight="850">Published Site</text>
      <text x="234" y="534" text-anchor="middle" fill="#334155" font-size="17">pages · essays · demos</text>
    </g>
    <g>
      <rect x="842" y="452" width="248" height="128" rx="26" fill="#FFEDD5"/>
      <text x="966" y="502" text-anchor="middle" fill="#9A3412" font-size="25" font-weight="850">Reusable Skills</text>
      <text x="966" y="534" text-anchor="middle" fill="#334155" font-size="17">workflows · constraints · templates</text>
    </g>
    <g>
      <rect x="438" y="620" width="324" height="82" rx="24" fill="#FEF9C3"/>
      <text x="600" y="654" text-anchor="middle" fill="#854D0E" font-size="23" font-weight="850">Learning Notes</text>
      <text x="600" y="681" text-anchor="middle" fill="#475569" font-size="16">rules that compound across tasks</text>
    </g>
  </g>
</svg>
